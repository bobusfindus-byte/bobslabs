<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Skyview</title>
    <style>
      :root {
        --safe-top: env(safe-area-inset-top, 0px);
        --safe-bottom: env(safe-area-inset-bottom, 0px);
        --font: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
        --accent: #4a9eff;
        --text: #e8edf5;
        --text-dim: #8094b4;
        --border: rgba(255, 255, 255, 0.1);
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        background: #0a0f1a;
        color: var(--text);
        font-family: var(--font);
        min-height: 100dvh;
      }

      /* ── Header ── */
      .header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 20;
        padding: calc(var(--safe-top) + 14px) 16px 12px;
        background: rgba(10, 15, 26, 0.82);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border-bottom: 1px solid var(--border);
      }
      .top-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 10px;
      }
      .app-title {
        font-size: 17px;
        font-weight: 700;
        flex: 1;
        letter-spacing: -0.3px;
      }

      .pill-group {
        display: flex;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 8px;
        padding: 2px;
        gap: 2px;
      }
      .pill-btn {
        background: none;
        border: none;
        color: var(--text-dim);
        font-family: var(--font);
        font-size: 12px;
        font-weight: 600;
        padding: 5px 11px;
        border-radius: 6px;
        cursor: pointer;
        white-space: nowrap;
        transition:
          background 0.15s,
          color 0.15s;
      }
      .pill-btn.active {
        background: var(--accent);
        color: #fff;
      }

      .search-row {
        display: flex;
        gap: 8px;
      }
      .search-input {
        flex: 1;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid var(--border);
        border-radius: 10px;
        color: var(--text);
        font-family: var(--font);
        font-size: 15px;
        padding: 9px 13px;
        outline: none;
      }
      .search-input::placeholder {
        color: var(--text-dim);
      }
      .search-input:focus {
        border-color: var(--accent);
      }
      .search-btn {
        background: var(--accent);
        border: none;
        border-radius: 10px;
        color: #fff;
        font-family: var(--font);
        font-size: 15px;
        font-weight: 600;
        padding: 9px 15px;
        cursor: pointer;
      }
      .locate-btn {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid var(--border);
        border-radius: 10px;
        color: var(--accent);
        font-family: var(--font);
        font-size: 18px;
        padding: 0 13px;
        cursor: pointer;
        line-height: 38px;
      }

      /* ── State screens ── */
      .state-screen {
        position: fixed;
        inset: 0;
        z-index: 5;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        color: var(--text-dim);
        font-size: 15px;
        text-align: center;
        padding: 0 32px;
      }
      .state-screen .big {
        font-size: 52px;
      }
      .state-screen .title {
        color: var(--text);
        font-size: 18px;
        font-weight: 600;
      }
      .spinner {
        width: 36px;
        height: 36px;
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* ── Sky view ── */
      #sky-canvas {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        display: block;
      }
      .sky-overlay {
        position: fixed;
        bottom: calc(var(--safe-bottom) + 28px);
        left: 0;
        right: 0;
        text-align: center;
        z-index: 5;
        pointer-events: none;
      }
      .sky-temp {
        font-size: 80px;
        font-weight: 200;
        letter-spacing: -4px;
        line-height: 1;
        text-shadow: 0 2px 30px rgba(0, 0, 0, 0.5);
      }
      .sky-cond {
        font-size: 19px;
        font-weight: 500;
        margin-top: 6px;
        color: rgba(255, 255, 255, 0.88);
        text-shadow: 0 1px 12px rgba(0, 0, 0, 0.6);
      }
      .sky-detail {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.5);
        margin-top: 6px;
        letter-spacing: 0.3px;
        text-shadow: 0 1px 8px rgba(0, 0, 0, 0.6);
      }

      /* ── Clock view ── */
      .clock-wrap {
        position: fixed;
        top: var(--header-h, 110px);
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 5;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding-bottom: calc(var(--safe-bottom) + 12px);
      }
      #clock-canvas {
        display: block;
      }
      .clock-summary {
        margin-top: 14px;
        font-size: 13px;
        color: var(--text-dim);
        text-align: center;
        letter-spacing: 0.2px;
      }

      /* ── Hourly strip ── */
      .hour-strip {
        display: flex;
        width: 100%;
        max-width: 520px;
        overflow-x: auto;
        scrollbar-width: none;
        margin-top: 14px;
        border-top: 1px solid var(--border);
        padding-top: 10px;
      }
      .hour-strip::-webkit-scrollbar { display: none; }
      .hi-item {
        flex: 1;
        min-width: 54px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        padding: 6px 4px 8px;
        border-radius: 8px;
      }
      .hi-item.hi-now {
        background: rgba(255,255,255,0.08);
      }
      .hi-time {
        font-size: 11px;
        color: var(--text-dim);
        font-weight: 500;
      }
      .hi-item.hi-now .hi-time {
        color: var(--accent);
        font-weight: 700;
      }
      .hi-icon { font-size: 17px; line-height: 1.2; }
      .hi-temp { font-size: 13px; font-weight: 600; }
      .hi-pp { font-size: 10px; color: #93c5fd; }

      /* ── Hour detail tooltip ── */
      .hour-tip {
        position: fixed;
        z-index: 30;
        background: rgba(17, 24, 39, 0.95);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px 14px;
        font-size: 13px;
        pointer-events: none;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        transform: translate(-50%, -110%);
        white-space: nowrap;
      }
      .hour-tip strong {
        font-size: 16px;
        color: var(--text);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="tip" class="hour-tip" style="display: none"></div>

    <script>
      // ── State ──────────────────────────────────────────────────────────────────
      const S = {
        phase: 'idle',
        unit: 'C',
        locName: '',
        weather: null,
        view: 'clock',
        lat: null,
        lon: null,
        lastUpdated: null,
        errMsg: '',
      };

      // ── WMO codes ──────────────────────────────────────────────────────────────
      const WMO = {
        0: { l: 'Clear', e: '☀️', cat: 'clear' },
        1: { l: 'Mostly Clear', e: '🌤', cat: 'clear' },
        2: { l: 'Partly Cloudy', e: '⛅️', cat: 'partly' },
        3: { l: 'Overcast', e: '☁️', cat: 'cloud' },
        45: { l: 'Fog', e: '🌫', cat: 'cloud' },
        48: { l: 'Icy Fog', e: '🌫', cat: 'cloud' },
        51: { l: 'Light Drizzle', e: '🌦', cat: 'drizzle' },
        53: { l: 'Drizzle', e: '🌦', cat: 'drizzle' },
        55: { l: 'Heavy Drizzle', e: '🌧', cat: 'rain' },
        61: { l: 'Light Rain', e: '🌧', cat: 'rain' },
        63: { l: 'Rain', e: '🌧', cat: 'rain' },
        65: { l: 'Heavy Rain', e: '🌧', cat: 'rain' },
        71: { l: 'Light Snow', e: '🌨', cat: 'snow' },
        73: { l: 'Snow', e: '❄️', cat: 'snow' },
        75: { l: 'Heavy Snow', e: '❄️', cat: 'snow' },
        77: { l: 'Snow Grains', e: '🌨', cat: 'snow' },
        80: { l: 'Showers', e: '🌦', cat: 'rain' },
        81: { l: 'Heavy Showers', e: '🌧', cat: 'rain' },
        82: { l: 'Violent Showers', e: '⛈', cat: 'storm' },
        85: { l: 'Snow Showers', e: '🌨', cat: 'snow' },
        86: { l: 'Heavy Snow Showers', e: '🌨', cat: 'snow' },
        95: { l: 'Thunderstorm', e: '⛈', cat: 'storm' },
        96: { l: 'Thunderstorm + Hail', e: '⛈', cat: 'storm' },
        99: { l: 'Thunderstorm + Heavy Hail', e: '⛈', cat: 'storm' },
      };
      function wmo(c) {
        return WMO[c] || WMO[0];
      }

      // ── Helpers ────────────────────────────────────────────────────────────────
      function T(c) {
        return S.unit === 'F' ? Math.round((c * 9) / 5 + 32) + '°F' : Math.round(c) + '°C';
      }

      function lerpHex(c1, c2, t) {
        const p = (c) => [
          parseInt(c.slice(1, 3), 16),
          parseInt(c.slice(3, 5), 16),
          parseInt(c.slice(5, 7), 16),
        ];
        const [r1, g1, b1] = p(c1),
          [r2, g2, b2] = p(c2);
        const h = (n) => Math.round(n).toString(16).padStart(2, '0');
        return '#' + h(r1 + (r2 - r1) * t) + h(g1 + (g2 - g1) * t) + h(b1 + (b2 - b1) * t);
      }

      function fmtHour(h) {
        if (h === 0) return '12 am';
        if (h === 12) return '12 pm';
        return h < 12 ? h + ' am' : h - 12 + ' pm';
      }

      // ── API ───────────────────────────────────────────────────────────────────
      async function loadWeather(lat, lon) {
        const url =
          `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
          `&hourly=temperature_2m,weathercode,precipitation_probability,windspeed_10m` +
          `&current_weather=true&timezone=auto&forecast_days=1`;
        const r = await fetch(url);
        if (!r.ok) throw new Error('API error');
        return r.json();
      }

      async function geocode(q) {
        const r = await fetch(
          `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=1&language=en`,
        );
        const d = await r.json();
        if (!d.results?.length) throw new Error('Not found');
        return d.results[0];
      }

      async function reverseGeocode(lat, lon) {
        const r = await fetch(
          `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`,
        );
        const d = await r.json();
        return (
          d.address?.city ||
          d.address?.town ||
          d.address?.village ||
          d.address?.county ||
          'Your Location'
        );
      }

      function saveLocation(name, lat, lon) {
        try {
          localStorage.setItem('skyview_loc', JSON.stringify({ name, lat, lon }));
        } catch (e) {}
      }
      function loadSavedLocation() {
        try {
          return JSON.parse(localStorage.getItem('skyview_loc'));
        } catch (e) {
          return null;
        }
      }

      // ── Sky gradient ───────────────────────────────────────────────────────────
      const SKY_STOPS = [
        { h: 0, top: '#030712', bot: '#0f172a' },
        { h: 4, top: '#0a0518', bot: '#1e0a3e' },
        { h: 5, top: '#1a0a3e', bot: '#3b0f6e' },
        { h: 6, top: '#7c2d12', bot: '#f97316' },
        { h: 7, top: '#075985', bot: '#fbbf24' },
        { h: 9, top: '#1d4ed8', bot: '#93c5fd' },
        { h: 12, top: '#1e40af', bot: '#3b82f6' },
        { h: 15, top: '#1d4ed8', bot: '#60a5fa' },
        { h: 17, top: '#7c3aed', bot: '#f97316' },
        { h: 19, top: '#4c1d95', bot: '#7c3aed' },
        { h: 21, top: '#0f0a2a', bot: '#1e1040' },
        { h: 24, top: '#030712', bot: '#0f172a' },
      ];

      function skyGradient(hour, cat) {
        const h = hour % 24;
        let i = SKY_STOPS.findIndex((s) => s.h > h) - 1;
        if (i < 0) i = SKY_STOPS.length - 2;
        const a = SKY_STOPS[i],
          b = SKY_STOPS[i + 1];
        const t = (h - a.h) / (b.h - a.h);
        let top = lerpHex(a.top, b.top, t);
        let bot = lerpHex(a.bot, b.bot, t);
        if (cat === 'cloud' || cat === 'rain' || cat === 'storm' || cat === 'drizzle') {
          top = lerpHex(top, '#1f2937', 0.65);
          bot = lerpHex(bot, '#374151', 0.55);
        } else if (cat === 'snow') {
          top = lerpHex(top, '#1e3a5f', 0.4);
          bot = lerpHex(bot, '#94a3b8', 0.45);
        } else if (cat === 'partly') {
          top = lerpHex(top, '#374151', 0.18);
          bot = lerpHex(bot, '#4b5563', 0.12);
        }
        return { top, bot };
      }

      // ── Clock color by category ────────────────────────────────────────────────
      const CAT_COLOR = {
        clear: '#ffd93d',
        partly: '#a8c4e0',
        cloud: '#6b7280',   // was #4b5563 — too dark against the bg
        drizzle: '#93c5fd',
        rain: '#3b82f6',
        snow: '#bfdbfe',    // was #dbeafe — too pale
        storm: '#7c3aed',
      };
      function catColor(cat) {
        return CAT_COLOR[cat] || '#4b5563';
      }

      // ── Day Clock ──────────────────────────────────────────────────────────────
      let clockHours = []; // cached for click detection

      function drawClock(canvas) {
        const dpr = window.devicePixelRatio || 1;
        const headerH = document.querySelector('.header')?.offsetHeight || 110;
        const stripH = 100; // hour strip + clock-summary
        const avail = Math.min(window.innerWidth * 0.9, window.innerHeight - headerH - stripH - 16);
        const logW = Math.min(avail, 520);
        canvas.style.width = logW + 'px';
        canvas.style.height = logW + 'px';
        canvas.width = logW * dpr;
        canvas.height = logW * dpr;

        const ctx = canvas.getContext('2d');
        ctx.scale(dpr, dpr);
        const L = logW;
        const cx = L / 2,
          cy = L / 2;
        const outerR = L * 0.415;
        const innerR = L * 0.255;
        const precipMaxW = L * 0.055;

        const now = new Date();
        const cur = S.weather.current_weather;
        const hourly = S.weather.hourly;
        const todayStr = now.toISOString().slice(0, 10);

        clockHours = [];
        hourly.time.forEach((t, i) => {
          if (t.slice(0, 10) === todayStr) {
            clockHours.push({
              h: new Date(t).getHours(),
              temp: hourly.temperature_2m[i],
              code: hourly.weathercode[i],
              precip: hourly.precipitation_probability[i] || 0,
              cat: wmo(hourly.weathercode[i]).cat,
              // geometry filled in below
              cx,
              cy,
              outerR,
              innerR,
            });
          }
        });

        const temps = clockHours.map((h) => h.temp);
        const minT = Math.min(...temps),
          maxT = Math.max(...temps);
        const tRange = Math.max(maxT - minT, 1);

        // Background disc
        ctx.beginPath();
        ctx.arc(cx, cy, outerR + precipMaxW + L * 0.01, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.06)';
        ctx.fill();

        // Segments
        clockHours.forEach((seg) => {
          const gap = 0.011;
          const sa = (seg.h / 24) * Math.PI * 2 - Math.PI / 2 + gap;
          const ea = ((seg.h + 1) / 24) * Math.PI * 2 - Math.PI / 2 - gap;
          seg.sa = sa;
          seg.ea = ea; // store for hit-test

          // Main fill — condition colour
          ctx.beginPath();
          ctx.arc(cx, cy, outerR, sa, ea);
          ctx.arc(cx, cy, innerR, ea, sa, true);
          ctx.closePath();
          ctx.fillStyle = catColor(seg.cat);
          ctx.globalAlpha = 0.92;
          ctx.fill();

          // Temperature heat tint overlay
          const tNorm = (seg.temp - minT) / tRange;
          ctx.beginPath();
          ctx.arc(cx, cy, outerR, sa, ea);
          ctx.arc(cx, cy, innerR, ea, sa, true);
          ctx.closePath();
          ctx.fillStyle = tNorm > 0.5 ? '#f97316' : '#60a5fa';
          ctx.globalAlpha = Math.abs(tNorm - 0.5) * 0.38;
          ctx.fill();
          ctx.globalAlpha = 1;

          // Precipitation outer arc
          if (seg.precip > 4) {
            const pw = (seg.precip / 100) * precipMaxW;
            ctx.beginPath();
            ctx.arc(cx, cy, outerR + 3 + pw / 2, sa, ea);
            ctx.strokeStyle = '#93c5fd';
            ctx.lineWidth = pw;
            ctx.globalAlpha = 0.55;
            ctx.stroke();
            ctx.globalAlpha = 1;
          }
        });

        // Current-hour highlight ring
        const nowH = now.getHours();
        const hSeg = clockHours.find((s) => s.h === nowH);
        if (hSeg) {
          ctx.beginPath();
          ctx.arc(cx, cy, outerR + 1, hSeg.sa, hSeg.ea);
          ctx.arc(cx, cy, innerR - 1, hSeg.ea, hSeg.sa, true);
          ctx.closePath();
          ctx.strokeStyle = 'rgba(255,255,255,0.9)';
          ctx.lineWidth = 2.5;
          ctx.stroke();
        }

        // Hour labels every 3h
        ctx.fillStyle = 'rgba(255,255,255,0.42)';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = `${L * 0.031}px -apple-system, sans-serif`;
        [0, 3, 6, 9, 12, 15, 18, 21].forEach((h) => {
          const a = (h / 24) * Math.PI * 2 - Math.PI / 2;
          const lr = outerR + precipMaxW + L * 0.045;
          ctx.fillText(
            h === 0 ? '12a' : h === 12 ? '12p' : h < 12 ? h + 'a' : h - 12 + 'p',
            cx + Math.cos(a) * lr,
            cy + Math.sin(a) * lr,
          );
        });

        // Clock hand
        const frac = (now.getHours() * 60 + now.getMinutes()) / (24 * 60);
        const ha = frac * Math.PI * 2 - Math.PI / 2;
        const hl = (outerR + innerR) / 2;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + Math.cos(ha) * hl, cy + Math.sin(ha) * hl);
        ctx.strokeStyle = 'rgba(0,0,0,0.35)';
        ctx.lineWidth = 4;
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + Math.cos(ha) * hl, cy + Math.sin(ha) * hl);
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Centre: current temp + condition
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = `200 ${L * 0.105}px -apple-system, sans-serif`;
        ctx.fillStyle = '#e8edf5';
        ctx.fillText(T(cur.temperature), cx, cy - L * 0.042);
        ctx.font = `500 ${L * 0.038}px -apple-system, sans-serif`;
        ctx.fillStyle = 'rgba(255,255,255,0.55)';
        ctx.fillText(wmo(cur.weathercode).e + ' ' + wmo(cur.weathercode).l, cx, cy + L * 0.065);

        // Centre dot
        ctx.beginPath();
        ctx.arc(cx, cy, 5, 0, Math.PI * 2);
        ctx.fillStyle = '#fff';
        ctx.fill();
      }

      // Clock tap → show hour tooltip
      function onClockTap(e) {
        const canvas = document.getElementById('clock-canvas');
        if (!canvas || !clockHours.length) return;
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left,
          my = e.clientY - rect.top;
        const L = parseFloat(canvas.style.width);
        const cx = L / 2,
          cy = L / 2;
        const dx = mx - cx,
          dy = my - cy;
        const dist = Math.sqrt(dx * dx + dy * dy);

        // Only respond within the ring
        const seg = clockHours[0];
        if (!seg || dist < seg.innerR || dist > seg.outerR + 20) {
          hideTip();
          return;
        }

        let angle = Math.atan2(dy, dx) + Math.PI / 2;
        if (angle < 0) angle += Math.PI * 2;
        const hourFrac = (angle / (Math.PI * 2)) * 24;
        const hit = clockHours.find((s) => s.h === Math.floor(hourFrac));
        if (!hit) {
          hideTip();
          return;
        }

        const tip = document.getElementById('tip');
        tip.style.display = 'block';
        tip.style.left = e.clientX + 'px';
        tip.style.top = e.clientY + 'px';
        tip.innerHTML = `<strong>${fmtHour(hit.h)}</strong> &nbsp; ${wmo(hit.code).e} ${T(hit.temp)} &nbsp; 💧 ${hit.precip}%`;
      }
      function hideTip() {
        const t = document.getElementById('tip');
        if (t) t.style.display = 'none';
      }
      document.addEventListener('click', (e) => {
        if (S.view === 'clock' && S.phase === 'ready') onClockTap(e);
        else hideTip();
      });

      // ── Living Sky ─────────────────────────────────────────────────────────────
      let skyRAF = null;
      const sky = { clouds: [], rain: [], snow: [], stars: [], ready: false };

      function initSkyParticles(W, H, cat) {
        const nClouds =
          { clear: 1, partly: 2, cloud: 4, drizzle: 4, rain: 5, snow: 3, storm: 6 }[cat] ?? 3;
        sky.clouds = Array.from({ length: nClouds }, (_, i) => ({
          x: Math.random() * W,
          y: H * (0.08 + i * 0.05 + Math.random() * 0.05),
          w: W * (0.2 + Math.random() * 0.3),
          hh: H * (0.055 + Math.random() * 0.04),
          spd: 0.12 + Math.random() * 0.22,
          dark: cat === 'storm' || cat === 'rain',
          alpha:
            {
              clear: 0.07,
              partly: 0.5,
              cloud: 0.72,
              drizzle: 0.7,
              rain: 0.78,
              snow: 0.65,
              storm: 0.82,
            }[cat] ?? 0.6,
        }));

        const nRain = { drizzle: 80, rain: 180, storm: 280 }[cat] ?? 0;
        sky.rain = Array.from({ length: nRain }, () => ({
          x: Math.random() * W,
          y: Math.random() * H,
          len: cat === 'drizzle' ? 7 : 14 + Math.random() * 14,
          spd: cat === 'drizzle' ? 6 : 12 + Math.random() * 9,
          alpha: cat === 'drizzle' ? 0.3 : 0.48,
        }));

        sky.snow =
          cat === 'snow'
            ? Array.from({ length: 130 }, () => ({
                x: Math.random() * W,
                y: Math.random() * H,
                r: 1.5 + Math.random() * 2.5,
                spd: 0.7 + Math.random() * 1.6,
                drift: (Math.random() - 0.5) * 0.4,
                a: 0.5 + Math.random() * 0.5,
              }))
            : [];

        const h = new Date().getHours();
        const nightClear = (h < 6 || h >= 20) && (cat === 'clear' || cat === 'partly');
        const starPalette = ['#ffffff', '#ffffff', '#ffffff', '#ccd8ff', '#ffe8dd'];
        sky.stars = nightClear
          ? Array.from({ length: cat === 'clear' ? 200 : 70 }, () => ({
              x: Math.random() * W,
              y: Math.random() * H * 0.65,
              r: 0.5 + Math.random() * 1.5,
              phase: Math.random() * Math.PI * 2,
              spd: 0.015 + Math.random() * 0.03,
              col: starPalette[Math.floor(Math.random() * starPalette.length)],
            }))
          : [];

        sky.ready = true;
      }

      // Soft volumetric cloud using radial gradients per puff
      function drawSoftCloud(ctx, x, y, w, hh, alpha, dark) {
        const [cr, cg, cb] = dark ? [52, 58, 72] : [218, 228, 242];
        const puffs = [
          [0,        0,        w * 0.50, hh],
          [-w*0.27,  hh*0.15,  w * 0.38, hh * 0.82],
          [ w*0.27,  hh*0.20,  w * 0.34, hh * 0.78],
          [-w*0.12, -hh*0.08,  w * 0.30, hh * 0.88],
          [ w*0.04, -hh*0.15,  w * 0.24, hh * 0.70],
        ];
        puffs.forEach(([dx, dy, rw, rh]) => {
          const px = x + dx, py = y + dy;
          const rad = Math.max(rw, rh) * 0.62;
          const g = ctx.createRadialGradient(px, py - rh * 0.08, rad * 0.1, px, py, rad);
          g.addColorStop(0,    `rgba(${cr},${cg},${cb},${alpha.toFixed(2)})`);
          g.addColorStop(0.55, `rgba(${Math.round(cr*0.88)},${Math.round(cg*0.88)},${Math.round(cb*0.90)},${(alpha*0.55).toFixed(2)})`);
          g.addColorStop(1,    `rgba(${Math.round(cr*0.75)},${Math.round(cg*0.75)},${Math.round(cb*0.80)},0)`);
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.ellipse(px, py, rw / 2, rh / 2, 0, 0, Math.PI * 2);
          ctx.fill();
        });
      }

      function animateSky(canvas) {
        if (skyRAF) {
          cancelAnimationFrame(skyRAF);
          skyRAF = null;
        }
        const dpr = window.devicePixelRatio || 1;
        canvas.width = window.innerWidth * dpr;
        canvas.height = window.innerHeight * dpr;
        canvas.style.width = window.innerWidth + 'px';
        canvas.style.height = window.innerHeight + 'px';
        const ctx = canvas.getContext('2d');
        ctx.scale(dpr, dpr);
        const W = window.innerWidth,
          H = window.innerHeight;

        const cur = S.weather.current_weather;
        const cat = wmo(cur.weathercode).cat;
        if (!sky.ready) initSkyParticles(W, H, cat);

        function frame() {
          if (!document.getElementById('sky-canvas')) {
            skyRAF = null;
            sky.ready = false;
            return;
          }
          ctx.clearRect(0, 0, W, H);

          // Sky gradient
          const h = new Date().getHours();
          const { top, bot } = skyGradient(h, cat);
          const grad = ctx.createLinearGradient(0, 0, 0, H);
          grad.addColorStop(0, top);
          grad.addColorStop(1, bot);
          ctx.fillStyle = grad;
          ctx.fillRect(0, 0, W, H);

          const isNight = h < 6 || h >= 20;
          const isDawn = h >= 5 && h < 7;
          const isDusk = h >= 17 && h < 20;

          // Stars (with subtle colour variation)
          sky.stars.forEach((s) => {
            s.phase += s.spd;
            const a = 0.35 + 0.65 * (0.5 + 0.5 * Math.sin(s.phase));
            ctx.globalAlpha = a;
            ctx.fillStyle = s.col || '#fff';
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
          });

          // Moon with soft halo
          if (isNight) {
            const mx = W * 0.76, my = H * 0.16;
            const moonHalo = ctx.createRadialGradient(mx, my, 10, mx, my, 90);
            moonHalo.addColorStop(0, 'rgba(180,200,240,0.20)');
            moonHalo.addColorStop(1, 'rgba(180,200,240,0)');
            ctx.fillStyle = moonHalo;
            ctx.beginPath();
            ctx.arc(mx, my, 90, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 0.94;
            ctx.fillStyle = '#d0ddf2';
            ctx.beginPath();
            ctx.arc(mx, my, 30, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = top;
            ctx.beginPath();
            ctx.arc(mx + 18, my - 10, 26, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
          }

          // Sun — smooth solar arc, layered glow, visible disc
          if (!isNight) {
            const now2 = new Date();
            const dayFrac = Math.max(0, Math.min(1, (h + now2.getMinutes() / 60 - 5.5) / 14));
            const sunX = W * (0.08 + dayFrac * 0.84);
            const elev  = Math.sin(dayFrac * Math.PI);
            const sunY  = H * (0.88 - elev * 0.76);
            const isLow = elev < 0.22;
            const glowR = isLow ? 180 : 100;

            // Outer atmospheric wash
            const atmo = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, glowR * 2.4);
            atmo.addColorStop(0, isLow ? 'rgba(255,120,25,0.30)' : 'rgba(255,215,90,0.14)');
            atmo.addColorStop(1, 'rgba(255,70,0,0)');
            ctx.fillStyle = atmo;
            ctx.fillRect(0, 0, W, H);

            if (cat === 'clear' || cat === 'partly' || isLow) {
              // Inner corona
              const corona = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, glowR);
              corona.addColorStop(0,   isLow ? 'rgba(255,195,55,0.90)' : 'rgba(255,238,150,0.75)');
              corona.addColorStop(0.4, isLow ? 'rgba(255,110,15,0.42)' : 'rgba(255,205,70,0.28)');
              corona.addColorStop(1,   'rgba(255,70,0,0)');
              ctx.fillStyle = corona;
              ctx.fillRect(0, 0, W, H);

              // Sun disc (fades in from horizon)
              const discAlpha = Math.min(1, elev * 5 + 0.25);
              ctx.globalAlpha = discAlpha;
              ctx.beginPath();
              ctx.arc(sunX, sunY, isLow ? 22 : 16, 0, Math.PI * 2);
              ctx.fillStyle = isLow ? '#ffe5a0' : '#fff8e8';
              ctx.fill();
              ctx.globalAlpha = 1;
            }
          }

          // Clouds — soft volumetric
          sky.clouds.forEach((c) => {
            c.x -= c.spd;
            if (c.x + c.w < -60) c.x = W + 60;
            drawSoftCloud(ctx, c.x, c.y, c.w, c.hh, c.alpha, c.dark);
          });

          // Atmospheric horizon haze
          const hazeGrad = ctx.createLinearGradient(0, H * 0.58, 0, H);
          hazeGrad.addColorStop(0, 'rgba(0,0,0,0)');
          hazeGrad.addColorStop(1, isNight ? 'rgba(0,4,20,0.42)' : 'rgba(130,155,195,0.20)');
          ctx.fillStyle = hazeGrad;
          ctx.fillRect(0, 0, W, H);

          // Rain — angle driven by actual wind direction
          const windDir = (cur.winddirection ?? 270);
          const rainDx = Math.cos(((windDir - 90) * Math.PI) / 180) * 0.3;
          sky.rain.forEach((r) => {
            r.y += r.spd;
            r.x += rainDx * r.spd;
            if (r.y > H) { r.y = -r.len; r.x = Math.random() * W; }
            if (r.x > W + 20) r.x -= W + 40;
            if (r.x < -20)    r.x += W + 40;
            ctx.globalAlpha = r.alpha;
            ctx.strokeStyle = cat === 'drizzle' ? 'rgba(180,210,255,0.65)' : '#93c5fd';
            ctx.lineWidth = cat === 'drizzle' ? 0.8 : 1.2;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(r.x, r.y);
            ctx.lineTo(r.x + rainDx * r.len, r.y + r.len);
            ctx.stroke();
            ctx.globalAlpha = 1;
          });

          // Snow
          sky.snow.forEach((s) => {
            s.y += s.spd;
            s.x += s.drift + Math.sin(s.y * 0.04) * 0.4;
            if (s.y > H) {
              s.y = -5;
              s.x = Math.random() * W;
            }
            ctx.globalAlpha = s.a;
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
          });

          // Lightning flash (storm)
          if (cat === 'storm' && Math.random() < 0.002) {
            ctx.fillStyle = 'rgba(255,255,255,0.12)';
            ctx.fillRect(0, 0, W, H);
          }

          skyRAF = requestAnimationFrame(frame);
        }
        frame();
      }

      // ── HTML ───────────────────────────────────────────────────────────────────
      function header() {
        return `<div class="header">
  <div class="top-row">
    <span class="app-title">🌤 ${S.locName || 'Skyview'}</span>
    <div class="pill-group">
      <button class="pill-btn ${S.unit === 'C' ? 'active' : ''}" onclick="S.unit='C';render()">°C</button>
      <button class="pill-btn ${S.unit === 'F' ? 'active' : ''}" onclick="S.unit='F';render()">°F</button>
    </div>
    <div class="pill-group">
      <button class="pill-btn ${S.view === 'sky' ? 'active' : ''}" onclick="setView('sky')">Sky</button>
      <button class="pill-btn ${S.view === 'clock' ? 'active' : ''}" onclick="setView('clock')">Clock</button>
    </div>
  </div>
  <div class="search-row">
    <input class="search-input" id="si" type="search" placeholder="Search city…" autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="search-btn" onclick="doSearch()">Search</button>
    <button class="locate-btn" onclick="locate()">⌖</button>
  </div>
</div>`;
      }

      function body() {
        if (S.phase === 'idle')
          return `<div class="state-screen">
  <div class="big">🌤</div>
  <div class="title">Skyview</div>
  <p>Search a city or use your location.</p>
</div>`;

        if (S.phase === 'loading')
          return `<div class="state-screen">
  <div class="spinner"></div><p>Loading weather…</p>
</div>`;

        if (S.phase === 'error')
          return `<div class="state-screen">
  <div class="big">⚠️</div>
  <div class="title">Something went wrong</div>
  <p>${S.errMsg}</p>
</div>`;

        const cur = S.weather.current_weather;
        const w = wmo(cur.weathercode);

        const hourly = S.weather.hourly;
        const todayStr = new Date().toISOString().slice(0, 10);
        const nowH = new Date().getHours();
        const ci = hourly.time.findIndex(
          (t) => t.slice(0, 10) === todayStr && new Date(t).getHours() === nowH,
        );
        const pp = ci >= 0 ? hourly.precipitation_probability[ci] ?? 0 : 0;

        if (S.view === 'sky') {
          return `<canvas id="sky-canvas"></canvas>
<div class="sky-overlay">
  <div class="sky-temp">${T(cur.temperature)}</div>
  <div class="sky-cond">${w.e} ${w.l}</div>
  <div class="sky-detail">💧 ${pp}% · 💨 ${Math.round(cur.windspeed)} km/h</div>
</div>`;
        }

        // Next 8 hours from current hour
        const nextHours = [];
        hourly.time.forEach((t, i) => {
          if (t.slice(0, 10) === todayStr) {
            const hh = new Date(t).getHours();
            if (hh >= nowH && nextHours.length < 8) {
              nextHours.push({
                h: hh,
                temp: hourly.temperature_2m[i],
                code: hourly.weathercode[i],
                precip: hourly.precipitation_probability[i] || 0,
              });
            }
          }
        });
        const hourStripHTML = nextHours.map((hr, idx) => `
          <div class="hi-item${idx === 0 ? ' hi-now' : ''}">
            <div class="hi-time">${idx === 0 ? 'Now' : fmtHour(hr.h)}</div>
            <div class="hi-icon">${wmo(hr.code).e}</div>
            <div class="hi-temp">${T(hr.temp)}</div>
            ${hr.precip >= 20 ? `<div class="hi-pp">💧${hr.precip}%</div>` : ''}
          </div>`).join('');

        return `<div class="clock-wrap">
  <canvas id="clock-canvas"></canvas>
  <div class="clock-summary">💧 ${pp}% · 💨 ${Math.round(cur.windspeed)} km/h</div>
  <div class="hour-strip">${hourStripHTML}</div>
</div>`;
      }

      // ── Render ─────────────────────────────────────────────────────────────────
      function render() {
        if (S.view !== 'sky' && skyRAF) {
          cancelAnimationFrame(skyRAF);
          skyRAF = null;
          sky.ready = false;
        }
        document.getElementById('root').innerHTML = header() + body();

        requestAnimationFrame(() => {
          const headerEl = document.querySelector('.header');
          if (headerEl) {
            document.documentElement.style.setProperty('--header-h', headerEl.offsetHeight + 'px');
          }
          if (S.phase !== 'ready') return;
          if (S.view === 'sky') {
            const c = document.getElementById('sky-canvas');
            if (c) animateSky(c);
          } else {
            const c = document.getElementById('clock-canvas');
            if (c) drawClock(c);
          }
        });
      }

      function setView(v) {
        S.view = v;
        render();
      }

      // ── Search & locate ────────────────────────────────────────────────────────
      async function search(q) {
        if (!q.trim()) return;
        S.phase = 'loading';
        render();
        try {
          const loc = await geocode(q);
          S.locName = loc.name + (loc.admin1 ? ', ' + loc.admin1 : '');
          S.lat = loc.latitude;
          S.lon = loc.longitude;
          S.weather = await loadWeather(S.lat, S.lon);
          S.lastUpdated = new Date();
          S.phase = 'ready';
          saveLocation(S.locName, S.lat, S.lon);
        } catch (e) {
          S.errMsg = 'Could not find that location.';
          S.phase = 'error';
        }
        render();
      }

      async function locate() {
        if (!navigator.geolocation) {
          S.errMsg = 'Geolocation not supported.';
          S.phase = 'error';
          render();
          return;
        }
        S.phase = 'loading';
        render();
        navigator.geolocation.getCurrentPosition(
          async (pos) => {
            try {
              const { latitude: lat, longitude: lon } = pos.coords;
              S.lat = lat;
              S.lon = lon;
              S.locName = await reverseGeocode(lat, lon);
              S.weather = await loadWeather(lat, lon);
              S.lastUpdated = new Date();
              S.phase = 'ready';
              saveLocation(S.locName, lat, lon);
            } catch (e) {
              S.errMsg = 'Failed to load weather.';
              S.phase = 'error';
            }
            render();
          },
          () => {
            S.errMsg = 'Location access denied.';
            S.phase = 'error';
            render();
          },
          { timeout: 12000 },
        );
      }

      function doSearch() {
        search((document.getElementById('si') || {}).value || '');
      }

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && e.target?.id === 'si') doSearch();
      });

      // ── Init ───────────────────────────────────────────────────────────────────
      (async () => {
        const saved = loadSavedLocation();
        if (saved) {
          S.locName = saved.name;
          S.lat = saved.lat;
          S.lon = saved.lon;
          S.phase = 'loading';
          render();
          try {
            S.weather = await loadWeather(saved.lat, saved.lon);
            S.lastUpdated = new Date();
            S.phase = 'ready';
          } catch (e) {
            S.phase = 'idle';
          }
        }
        render();
      })();
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <title>Get Some Wax</title>
    <style>
      :root {
        --bg: #0d1117;
        --surface: #161b22;
        --surface2: #21262d;
        --border: rgba(255, 255, 255, 0.08);
        --text: #e6edf3;
        --text-dim: #8b949e;
        --text-mid: #b1bac4;
        --purple: #c084fc;
        --purple-bright: #e9d5ff;
        --green: #4ade80;
        --blue: #4a9eff;
        --safe-top: env(safe-area-inset-top, 0px);
        --safe-bottom: env(safe-area-inset-bottom, 0px);
        --font: -apple-system, "SF Pro Display", "Helvetica Neue", sans-serif;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font);
        min-height: 100dvh;
      }

      /* ── Header ── */
      .header {
        position: sticky;
        top: 0;
        z-index: 10;
        background: var(--bg);
        padding: calc(var(--safe-top) + 14px) 16px 12px;
        border-bottom: 1px solid var(--border);
      }
      .top-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 10px;
      }
      .app-title {
        font-size: 17px;
        font-weight: 700;
        flex: 1;
        letter-spacing: -0.2px;
      }
      .search-row {
        display: flex;
        gap: 8px;
      }
      .search-input {
        flex: 1;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 10px;
        color: var(--text);
        font-family: var(--font);
        font-size: 15px;
        padding: 9px 13px;
        outline: none;
      }
      .search-input::placeholder {
        color: var(--text-dim);
      }
      .search-input:focus {
        border-color: var(--purple);
      }
      .locate-btn {
        background: var(--purple);
        border: none;
        border-radius: 10px;
        color: #000;
        font-family: var(--font);
        font-size: 14px;
        font-weight: 700;
        padding: 0 14px;
        cursor: pointer;
        white-space: nowrap;
        line-height: 38px;
      }
      .locate-btn:active {
        opacity: 0.8;
      }

      /* ── Control bar ── */
      .control-bar {
        display: flex;
        align-items: center;
        padding: 12px 16px 0;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      .control-bar::-webkit-scrollbar { display: none; }
      .ctrl-group {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-shrink: 0;
      }
      .ctrl-sep {
        width: 1px;
        height: 16px;
        background: var(--border);
        margin: 0 10px;
        flex-shrink: 0;
      }
      .ctrl-chip {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 20px;
        color: var(--text-dim);
        font-family: var(--font);
        font-size: 12px;
        font-weight: 600;
        padding: 5px 12px;
        cursor: pointer;
        transition:
          border-color 0.15s,
          color 0.15s,
          background 0.15s;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .ctrl-chip.active {
        border-color: var(--purple);
        color: var(--purple);
        background: rgba(192, 132, 252, 0.08);
      }

      /* ── Radar ── */
      .radar-wrap {
        display: flex;
        justify-content: center;
        padding: 16px;
      }
      #radar {
        display: block;
        border-radius: 50%;
        cursor: pointer;
      }

      /* ── State screens ── */
      .state-screen {
        min-height: 52vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        color: var(--text-dim);
        font-size: 15px;
        text-align: center;
        padding: 0 32px;
      }
      .state-screen .big {
        font-size: 52px;
      }
      .state-screen .title {
        color: var(--text);
        font-size: 18px;
        font-weight: 600;
      }
      .spinner {
        width: 36px;
        height: 36px;
        border: 3px solid var(--surface2);
        border-top-color: var(--purple);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      /* ── Results ── */
      .results-header {
        padding: 4px 16px 10px;
        font-size: 12px;
        font-weight: 700;
        color: var(--text-dim);
        letter-spacing: 0.8px;
        text-transform: uppercase;
      }

      /* ── Shop card ── */
      .shop-card {
        margin: 0 16px 6px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px;
        cursor: pointer;
        transition: border-color 0.15s;
      }
      .shop-card.selected {
        border-color: var(--purple);
      }
      .shop-card:active {
        opacity: 0.85;
      }
      .card-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .shop-name {
        font-size: 16px;
        font-weight: 600;
      }
      .shop-meta {
        font-size: 12px;
        color: var(--text-dim);
      }
      .open-now {
        color: var(--green);
        font-weight: 600;
      }
      .card-meta-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 4px;
        margin-bottom: 8px;
      }
      .card-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
      }
      .meta-dir {
        font-size: 13px;
        color: var(--purple);
        text-decoration: none;
        font-weight: 700;
        opacity: 0.85;
        transition: opacity 0.15s;
      }
      .meta-dir:hover { opacity: 1; }
      .disc-score {
        font-size: 19px;
        white-space: nowrap;
        flex-shrink: 0;
        line-height: 1;
      }
      .pills {
        display: flex;
        flex-wrap: nowrap;
        gap: 5px;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      .pills::-webkit-scrollbar { display: none; }
      .pill {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 3px 9px;
        font-size: 11px;
        color: var(--text-mid);
        white-space: nowrap;
        cursor: pointer;
      }
      .pill.gold {
        border-color: rgba(192, 132, 252, 0.38);
        color: var(--purple);
      }
      .pill.tag-active {
        background: rgba(192, 132, 252, 0.18);
        border-color: var(--purple);
        color: var(--purple);
      }

      .empty-state {
        padding: 40px 16px;
        text-align: center;
        color: var(--text-dim);
        font-size: 14px;
        line-height: 1.6;
      }
      .empty-state .big {
        font-size: 40px;
        margin-bottom: 10px;
      }

      .bottom-pad {
        height: calc(var(--safe-bottom) + 32px);
      }

      /* ── Icon buttons ── */
      .icon-btn {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text-dim);
        font-size: 16px;
        padding: 5px 9px;
        cursor: pointer;
        line-height: 1;
        flex-shrink: 0;
      }
      .icon-btn.active {
        border-color: var(--purple);
        color: var(--purple);
      }

      /* ── Discogs link ── */
      .discogs-link {
        font-size: 16px;
        text-decoration: none;
        opacity: 0.45;
        transition: opacity 0.15s;
        flex-shrink: 0;
      }
      .discogs-link:hover { opacity: 1; }

      /* ── Fav button ── */
      .fav-btn {
        background: none;
        border: none;
        font-size: 16px;
        cursor: pointer;
        opacity: 0.25;
        transition: opacity 0.15s;
        padding: 0;
        line-height: 1;
        flex-shrink: 0;
      }
      .fav-btn.active {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // ── State ──────────────────────────────────────────────────────────────────
      const S = {
        phase: "idle", // idle | loading | ready | error
        lat: null,
        lon: null,
        shops: [],
        radius: 1000,
        selected: null,
        showAll: true,
        secondHandOnly: false,
        favsOnly: false,
        sortBy: "score",
        tagFilter: null,
        heading: null,
        compassOn: false,
        errMsg: "",
      };

      // ── Chain filter (not specialist record shops) ─────────────────────────────
      const CHAINS = ["hmv", "tower records", "virgin megastore"];

      // ── Scoring ────────────────────────────────────────────────────────────────
      function shopScore(tags, name) {
        const n = (name || "").toLowerCase();
        if (CHAINS.some((c) => n.includes(c))) return 1;

        let s = 3;

        // Second-hand = prime digging territory
        if (tags.second_hand === "yes" || tags.second_hand === "only") s += 2;
        if (tags.shop === "second_hand") s += 1;

        // Genre info = shop that knows its stock
        if (tags.genre) s += 2;

        // Sell tag explicitly mentions vinyl
        const sell = (tags.sell || "").toLowerCase();
        if (sell.includes("vinyl")) s += 2;
        if (sell.includes("cassette")) s += 1;

        // Name signals a specialist shop
        const specWords = ["vinyl", "record", "wax", "groove", "disc", "disk", "analogue", "analog"];
        if (specWords.some((w) => n.includes(w))) s += 1;

        // Operational completeness
        if (tags.website || tags["contact:website"]) s += 1;
        if (tags.opening_hours) s += 1;

        return Math.min(10, s);
      }

      function isSecondHand(tags) {
        return (
          tags.second_hand === "yes" ||
          tags.second_hand === "only" ||
          tags.shop === "second_hand"
        );
      }

      function shopBadges(tags) {
        const b = [];

        if (isSecondHand(tags))
          b.push({ t: "🖤 Second Hand", gold: true });

        const sell = (tags.sell || "").toLowerCase();
        if (sell.includes("vinyl")) b.push({ t: "Vinyl", gold: true });
        if (sell.includes("cassette")) b.push({ t: "📼 Cassettes", gold: false });
        if (sell.includes("cd")) b.push({ t: "CDs", gold: false });

        if (tags.genre) {
          tags.genre
            .split(";")
            .map((g) => g.trim())
            .filter(Boolean)
            .slice(0, 3)
            .forEach((g) => b.push({ t: `🎵 ${g}`, gold: false }));
        }

        if (tags.wheelchair === "yes") b.push({ t: "♿ Accessible", gold: false });

        return b;
      }

      function discs(score) {
        const filled = Math.round(score / 2);
        return Array.from(
          { length: 5 },
          (_, i) => `<span style="opacity:${i < filled ? 1 : 0.14}">💿</span>`,
        ).join("");
      }

      // ── Geo ────────────────────────────────────────────────────────────────────
      function haversine(lat1, lon1, lat2, lon2) {
        const R = 6371000;
        const dL = ((lat2 - lat1) * Math.PI) / 180,
          dO = ((lon2 - lon1) * Math.PI) / 180;
        const a =
          Math.sin(dL / 2) ** 2 +
          Math.cos((lat1 * Math.PI) / 180) *
            Math.cos((lat2 * Math.PI) / 180) *
            Math.sin(dO / 2) ** 2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      }

      function bearingDeg(lat1, lon1, lat2, lon2) {
        const dL = ((lon2 - lon1) * Math.PI) / 180;
        const y = Math.sin(dL) * Math.cos((lat2 * Math.PI) / 180);
        const x =
          Math.cos((lat1 * Math.PI) / 180) * Math.sin((lat2 * Math.PI) / 180) -
          Math.sin((lat1 * Math.PI) / 180) *
            Math.cos((lat2 * Math.PI) / 180) *
            Math.cos(dL);
        return ((Math.atan2(y, x) * 180) / Math.PI + 360) % 360;
      }

      const COMPASS = ["N", "NE", "E", "SE", "S", "SW", "W", "NW"];
      function compass(deg) {
        return COMPASS[Math.round(deg / 45) % 8];
      }

      function fmtDist(m) {
        return m < 1000 ? Math.round(m) + "m" : (m / 1000).toFixed(1) + "km";
      }

      function mapsLink(name, lat, lon) {
        const ios = /iPad|iPhone|iPod/.test(navigator.userAgent);
        if (ios)
          return `https://maps.apple.com/?q=${encodeURIComponent(name)}&ll=${lat},${lon}`;
        return `https://www.google.com/maps/search/?api=1&query=${lat},${lon}`;
      }

      function discogsLink(name) {
        return `https://www.discogs.com/search/?q=${encodeURIComponent(name)}&type=user`;
      }

      // ── Opening hours ──────────────────────────────────────────────────────────
      function openStatus(h) {
        if (!h) return null;
        try {
          const now = new Date();
          const cur = now.getHours() + now.getMinutes() / 60;
          const m = h.match(/(\d{1,2}:\d{2})-(\d{1,2}:\d{2})/);
          if (!m) return null;
          const parse = (t) => {
            const [hh, mm] = t.split(":").map(Number);
            return hh + mm / 60;
          };
          const o = parse(m[1]),
            c = parse(m[2]);
          return cur >= o && cur < (c < o ? c + 24 : c);
        } catch (e) {
          return null;
        }
      }

      // ── Overpass fetch ─────────────────────────────────────────────────────────
      const OVERPASS_ENDPOINTS = [
        "https://overpass-api.de/api/interpreter",
        "https://overpass.kumi.systems/api/interpreter",
      ];

      // Cancelled when a newer fetchShops call starts, so only one request is
      // ever in-flight at a time (avoids Overpass rate-limit on rapid radius changes)
      let pendingAbort = null;

      async function fetchShops(lat, lon, radius) {
        pendingAbort?.abort();

        const q = `[out:json][timeout:30];
(
  node["shop"="music"](around:${radius},${lat},${lon});
  way["shop"="music"](around:${radius},${lat},${lon});
  node["shop"="second_hand"]["name"~"record|vinyl|wax|groove|disc",i](around:${radius},${lat},${lon});
  way["shop"="second_hand"]["name"~"record|vinyl|wax|groove|disc",i](around:${radius},${lat},${lon});
);
out center body;`;

        let lastErr;
        for (const endpoint of OVERPASS_ENDPOINTS) {
          const controller = new AbortController();
          pendingAbort = controller;
          const timer = setTimeout(() => controller.abort(), 35000);
          try {
            const res = await fetch(endpoint, {
              method: "POST",
              body: q,
              signal: controller.signal,
            });
            clearTimeout(timer);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            if (data.remark?.includes("runtime error") || data.remark?.includes("timeout")) {
              throw new Error("Overpass timeout");
            }
            pendingAbort = null;
            const seen = new Set();
            return data.elements
              .filter((el) => el.tags?.name)
              .map((el) => {
                const lat2 = el.lat ?? el.center?.lat;
                const lon2 = el.lon ?? el.center?.lon;
                const tags = el.tags || {};
                const name = tags.name;
                return {
                  id: el.id,
                  name,
                  lat: lat2,
                  lon: lon2,
                  tags,
                  score: shopScore(tags, name),
                  badges: shopBadges(tags),
                  dist: haversine(lat, lon, lat2, lon2),
                  bearing: bearingDeg(lat, lon, lat2, lon2),
                  open: openStatus(tags.opening_hours),
                  secondHand: isSecondHand(tags),
                  website: tags.website || tags["contact:website"] || null,
                  cx: 0,
                  cy: 0,
                };
              })
              .filter((s) => {
                if (s.lat == null || s.lon == null) return false;
                if (seen.has(s.id)) return false;
                seen.add(s.id);
                return true;
              });
          } catch (e) {
            clearTimeout(timer);
            // Only treat as intentional cancellation if a newer fetchShops call has
            // already replaced pendingAbort. If OUR timer fired the abort, pendingAbort
            // still equals controller, so we fall through and try the fallback endpoint.
            if (e.name === "AbortError" && pendingAbort !== controller) throw e;
            lastErr = e;
          }
        }
        throw lastErr;
      }

      // ── Radar ──────────────────────────────────────────────────────────────────
      let dots = [];

      function scoreColor(s) {
        if (s >= 8) return "#4ade80";
        if (s >= 6) return "#c084fc";
        if (s >= 4) return "#a78bfa";
        return "#6b7280";
      }

      function drawRadar(canvas) {
        const dpr = window.devicePixelRatio || 1;
        const size = Math.min(window.innerWidth - 32, 400);
        canvas.style.width = size + "px";
        canvas.style.height = size + "px";
        canvas.width = size * dpr;
        canvas.height = size * dpr;
        const ctx = canvas.getContext("2d");
        ctx.scale(dpr, dpr);
        const L = size,
          cx = L / 2,
          cy = L / 2,
          maxR = L / 2 - 22;
        dots = [];

        // Disc background
        ctx.beginPath();
        ctx.arc(cx, cy, maxR + 2, 0, Math.PI * 2);
        ctx.fillStyle = "#0d1117";
        ctx.fill();
        ctx.beginPath();
        ctx.arc(cx, cy, maxR + 2, 0, Math.PI * 2);
        ctx.strokeStyle = "rgba(192,132,252,0.22)";
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // Distance rings + labels
        const ringMetres =
          S.radius <= 250
            ? [125]
            : S.radius <= 500
              ? [250, 500]
              : S.radius <= 1000
                ? [333, 666, 1000]
                : S.radius <= 2000
                  ? [500, 1000, 1500, 2000]
                  : [1000, 2500, 5000];
        ringMetres.forEach((m) => {
          const r = (m / S.radius) * maxR;
          ctx.beginPath();
          ctx.arc(cx, cy, r, 0, Math.PI * 2);
          ctx.strokeStyle = "rgba(255,255,255,0.05)";
          ctx.lineWidth = 1;
          ctx.stroke();
          ctx.fillStyle = "rgba(255,255,255,0.18)";
          ctx.font = `${L * 0.026}px -apple-system, sans-serif`;
          ctx.textAlign = "center";
          ctx.textBaseline = "top";
          ctx.fillText(fmtDist(m), cx, cy - r + 3);
        });

        // Crosshairs
        ctx.save();
        ctx.strokeStyle = "rgba(255,255,255,0.04)";
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 5]);
        ctx.beginPath();
        ctx.moveTo(cx, cy - maxR);
        ctx.lineTo(cx, cy + maxR);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(cx - maxR, cy);
        ctx.lineTo(cx + maxR, cy);
        ctx.stroke();
        ctx.restore();

        // Cardinal labels
        const hOff = S.compassOn && S.heading != null ? S.heading : 0;
        ctx.fillStyle = "rgba(192,132,252,0.55)";
        ctx.font = `600 ${L * 0.028}px -apple-system, sans-serif`;
        [
          ["N", 0],
          ["E", 90],
          ["S", 180],
          ["W", 270],
        ].forEach(([lbl, deg]) => {
          const a = ((deg - hOff - 90) * Math.PI) / 180;
          const lr = maxR + 14;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(lbl, cx + Math.cos(a) * lr, cy + Math.sin(a) * lr);
        });

        // Shop dots
        getVisibleShops().forEach((shop) => {
          const a = ((shop.bearing - hOff - 90) * Math.PI) / 180;
          const dr = Math.min(shop.dist / S.radius, 1) * maxR;
          const px = cx + Math.cos(a) * dr;
          const py = cy + Math.sin(a) * dr;
          shop.cx = px;
          shop.cy = py;

          const dotR = 4 + (shop.score / 10) * 7;
          const col = scoreColor(shop.score);
          const sel = S.selected?.id === shop.id;

          if (sel || shop.score >= 6) {
            const g = ctx.createRadialGradient(px, py, 0, px, py, dotR * 3.5);
            g.addColorStop(0, col + "44");
            g.addColorStop(1, "transparent");
            ctx.beginPath();
            ctx.arc(px, py, dotR * 3.5, 0, Math.PI * 2);
            ctx.fillStyle = g;
            ctx.fill();
          }

          if (sel) {
            ctx.beginPath();
            ctx.arc(px, py, dotR + 5, 0, Math.PI * 2);
            ctx.strokeStyle = col;
            ctx.lineWidth = 1.5;
            ctx.stroke();
          }

          ctx.beginPath();
          ctx.arc(px, py, dotR, 0, Math.PI * 2);
          ctx.fillStyle = col;
          ctx.fill();

          dots.push({ id: shop.id, cx: px, cy: py, hitR: dotR + 9 });
        });

        // User dot
        const ug = ctx.createRadialGradient(cx, cy, 0, cx, cy, 14);
        ug.addColorStop(0, "rgba(74,158,255,0.35)");
        ug.addColorStop(1, "transparent");
        ctx.beginPath();
        ctx.arc(cx, cy, 14, 0, Math.PI * 2);
        ctx.fillStyle = ug;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(cx, cy, 5, 0, Math.PI * 2);
        ctx.fillStyle = "#4a9eff";
        ctx.fill();
        ctx.beginPath();
        ctx.arc(cx, cy, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = "#fff";
        ctx.fill();
      }

      function onRadarTap(e) {
        const canvas = document.getElementById("radar");
        if (!canvas) return;
        const rect = canvas.getBoundingClientRect();
        const scale =
          canvas.width / rect.width / (window.devicePixelRatio || 1);
        const mx = (e.clientX - rect.left) * scale;
        const my = (e.clientY - rect.top) * scale;
        const hit = dots.find((d) => Math.hypot(mx - d.cx, my - d.cy) < d.hitR);
        if (!hit) return;
        S.selected =
          S.selected?.id === hit.id
            ? null
            : S.shops.find((s) => s.id === hit.id) || null;
        render();
        if (S.selected) {
          requestAnimationFrame(() => {
            document
              .getElementById("card-" + hit.id)
              ?.scrollIntoView({ behavior: "smooth", block: "nearest" });
          });
        }
      }

      // ── Favourites ─────────────────────────────────────────────────────────────
      const FAV_LS = "wax_favs";
      function getFavs() {
        return new Set(JSON.parse(localStorage.getItem(FAV_LS) || "[]"));
      }
      function toggleFav(id, e) {
        if (e) e.stopPropagation();
        const f = getFavs();
        f.has(id) ? f.delete(id) : f.add(id);
        localStorage.setItem(FAV_LS, JSON.stringify([...f]));
        render();
      }

      // ── Compass ────────────────────────────────────────────────────────────────
      function onOrientation(e) {
        const h =
          e.webkitCompassHeading != null
            ? e.webkitCompassHeading
            : e.alpha != null
              ? (360 - e.alpha) % 360
              : null;
        if (h == null) return;
        S.heading = h;
        const canvas = document.getElementById("radar");
        if (canvas) drawRadar(canvas);
      }

      function toggleCompass() {
        if (S.compassOn) {
          S.compassOn = false;
          S.heading = null;
          window.removeEventListener("deviceorientation", onOrientation, true);
          render();
          return;
        }
        const start = () => {
          S.compassOn = true;
          window.addEventListener("deviceorientation", onOrientation, true);
          render();
        };
        if (
          typeof DeviceOrientationEvent !== "undefined" &&
          typeof DeviceOrientationEvent.requestPermission === "function"
        ) {
          DeviceOrientationEvent.requestPermission()
            .then((s) => { if (s === "granted") start(); })
            .catch(() => {});
        } else {
          start();
        }
      }

      function filterByTag(tag, e) {
        if (e) e.stopPropagation();
        S.tagFilter = S.tagFilter === tag ? null : tag;
        render();
      }

      function getVisibleShops() {
        let shops = S.showAll ? S.shops : S.shops.filter((s) => s.score >= 5);
        if (S.secondHandOnly) shops = shops.filter((s) => s.secondHand);
        if (S.favsOnly) shops = shops.filter((s) => getFavs().has(s.id));
        if (S.tagFilter)
          shops = shops.filter((s) =>
            s.badges.some((b) => b.t === S.tagFilter),
          );
        return [...shops].sort((a, b) =>
          S.sortBy === "distance" ? a.dist - b.dist : b.score - a.score,
        );
      }

      // ── HTML ───────────────────────────────────────────────────────────────────
      function header() {
        return `<div class="header">
  <div class="top-row">
    <span class="app-title">💿 Get Some Wax</span>
    <button class="icon-btn${S.compassOn ? " active" : ""}" onclick="toggleCompass()" title="Compass">🧭</button>
  </div>
  <div class="search-row">
    <input class="search-input" id="si" type="search" placeholder="Search a neighbourhood…" autocomplete="off" spellcheck="false">
    <button class="locate-btn" onclick="locate()">📍 Find Me</button>
  </div>
</div>`;
      }

      function body() {
        if (S.phase === "idle")
          return `<div class="state-screen">
  <div class="big">🖤</div>
  <div class="title">Get Some Wax</div>
  <p>Independent record shops near you.<br>Vinyl, second-hand, and everything worth digging for.</p>
</div>`;

        if (S.phase === "loading")
          return `<div class="state-screen">
  <div class="spinner"></div>
  <p>Crate digging…</p>
</div>`;

        if (S.phase === "error")
          return `<div class="state-screen">
  <div class="big">😬</div>
  <div class="title">Something went wrong</div>
  <p>${S.errMsg}</p>
</div>`;

        const radii = [250, 500, 1000, 2000, 5000];
        const controlBar = `<div class="control-bar">
  <div class="ctrl-group">
    ${radii.map((r) => `<button class="ctrl-chip${S.radius === r ? " active" : ""}" onclick="setRadius(${r})">${fmtDist(r)}</button>`).join("")}
  </div>
  <div class="ctrl-sep"></div>
  <div class="ctrl-group">
    <button class="ctrl-chip${S.secondHandOnly ? " active" : ""}" onclick="S.secondHandOnly=!S.secondHandOnly;render()">🖤 Second Hand</button>
    <button class="ctrl-chip${S.favsOnly ? " active" : ""}" onclick="S.favsOnly=!S.favsOnly;render()">⭐ Saved</button>
    <button class="ctrl-chip${!S.showAll ? " active" : ""}" onclick="S.showAll=!S.showAll;render()">${S.showAll ? "Curated" : "All shops"}</button>
    <button class="ctrl-chip" onclick="S.sortBy=S.sortBy==='score'?'distance':'score';render()">${S.sortBy === "score" ? "🏆 Vibes" : "📍 Near"}</button>
    ${S.tagFilter ? `<button class="ctrl-chip active" onclick="S.tagFilter=null;render()">✕ ${S.tagFilter}</button>` : ""}
  </div>
</div>`;

        const radar = `<div class="radar-wrap"><canvas id="radar"></canvas></div>`;

        const visibleShops = getVisibleShops();
        let cards;
        if (!visibleShops.length) {
          cards = `<div class="empty-state">
  <div class="big">🎵</div>
  ${S.secondHandOnly
    ? "No second-hand record shops found within " + fmtDist(S.radius) + ". Try a larger radius or turn off the filter."
    : "No record shops found within " + fmtDist(S.radius) + ". Try a larger radius" + (!S.showAll ? " or tap 'All shops' to remove the curated filter." : ".")}
</div>`;
        } else {
          const n = visibleShops.length;
          const favs = getFavs();
          cards =
            `<div class="results-header">${n} shop${n !== 1 ? "s" : ""}</div>` +
            visibleShops
              .map((shop) => {
                const sel = S.selected?.id === shop.id;
                const isFav = favs.has(shop.id);

                const openTag = shop.open === true
                  ? ` · <span class="open-now">Open</span>`
                  : shop.open === false
                    ? ` · <span style="color:var(--text-dim)">Closed</span>`
                    : "";

                const pillsRow = shop.badges.length
                  ? `<div class="pills">${shop.badges.map((b) =>
                      `<span class="pill${b.gold ? " gold" : ""}${S.tagFilter === b.t ? " tag-active" : ""}" data-tag="${b.t.replace(/"/g, "&quot;")}" onclick="filterByTag(this.dataset.tag,event)">${b.t}</span>`
                    ).join("")}</div>`
                  : "";

                return `<div class="shop-card${sel ? " selected" : ""}" id="card-${shop.id}" onclick="selectShop(${shop.id})">
  <div class="card-top">
    <div class="shop-name">${shop.name}</div>
    <div class="disc-score">${discs(shop.score)}</div>
  </div>
  <div class="card-meta-row">
    <div class="shop-meta">${fmtDist(shop.dist)} · ${compass(shop.bearing)}${openTag}</div>
    <div class="card-actions">
      <a class="discogs-link" href="${discogsLink(shop.name)}" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="Search on Discogs">🔍</a>
      <button class="fav-btn${isFav ? " active" : ""}" onclick="toggleFav(${shop.id},event)" title="${isFav ? "Unsave" : "Save"}">⭐</button>
      <a class="meta-dir" href="${mapsLink(shop.name, shop.lat, shop.lon)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">→</a>
    </div>
  </div>
  ${pillsRow}
</div>`;
              })
              .join("");
        }

        return controlBar + radar + cards + `<div class="bottom-pad"></div>`;
      }

      // ── Render ─────────────────────────────────────────────────────────────────
      function render() {
        document.getElementById("root").innerHTML = header() + body();
        const canvas = document.getElementById("radar");
        if (canvas) {
          drawRadar(canvas);
          canvas.addEventListener("click", onRadarTap);
        }
      }

      function selectShop(id) {
        S.selected =
          S.selected?.id === id
            ? null
            : S.shops.find((s) => s.id === id) || null;
        render();
      }

      function setRadius(r) {
        if (r === S.radius || !S.lat) return;
        S.radius = r;
        S.selected = null;
        S.phase = "loading";
        render();
        fetchShops(S.lat, S.lon, r)
          .then((shops) => {
            S.shops = shops;
            S.phase = "ready";
            render();
          })
          .catch((e) => {
            if (e?.name === "AbortError") return;
            S.errMsg = "Could not load shops. Try again.";
            S.phase = "error";
            render();
          });
      }

      // ── Locate & search ────────────────────────────────────────────────────────
      function locate() {
        if (!navigator.geolocation) {
          S.errMsg = "Geolocation not available.";
          S.phase = "error";
          render();
          return;
        }
        S.phase = "loading";
        render();
        navigator.geolocation.getCurrentPosition(
          async (pos) => {
            try {
              S.lat = pos.coords.latitude;
              S.lon = pos.coords.longitude;
              S.shops = await fetchShops(S.lat, S.lon, S.radius);
              S.phase = "ready";
            } catch (e) {
              if (e?.name === "AbortError") return;
              S.errMsg = "Could not load shops. Try again.";
              S.phase = "error";
            }
            render();
          },
          () => {
            S.errMsg = "Location access denied.";
            S.phase = "error";
            render();
          },
          { timeout: 12000, enableHighAccuracy: true },
        );
      }

      async function searchArea(q) {
        if (!q.trim()) return;
        S.phase = "loading";
        render();
        try {
          const res = await fetch(
            `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=1&language=en`,
          );
          const d = await res.json();
          if (!d.results?.length) throw new Error("not found");
          const { latitude: lat, longitude: lon } = d.results[0];
          S.lat = lat;
          S.lon = lon;
          S.shops = await fetchShops(lat, lon, S.radius);
          S.phase = "ready";
        } catch (e) {
          if (e?.name === "AbortError") return;
          S.errMsg =
            e.message === "not found"
              ? "Location not found."
              : "Could not load shops.";
          S.phase = "error";
        }
        render();
      }

      document.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && e.target?.id === "si")
          searchArea(e.target.value);
      });

      render();
    </script>
  </body>
</html>
